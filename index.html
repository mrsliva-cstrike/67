<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Video Player</title>
    <style>
        /* Убираем все отступы и полосы прокрутки */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Черный фон, пока грузится видео */
        }
        /* Растягиваем видео на весь экран */
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover; /* Видео заполнит экран без черных полос */
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline>
        <source src="gazan67.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

</body>
</html>
