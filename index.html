<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer; /* Показываем иконку руки, чтобы игрок понимал, что можно кликнуть */
        }
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
    </style>
</head>
<body>

    <video id="myVideo" autoplay loop muted playsinline>
        <source src="gazan67.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

    <script>
        const video = document.getElementById('myVideo');

        // Функция, которая снимает заглушку звука
        function unmuteVideo() {
            video.muted = false;
            // Убираем слушатели событий, чтобы они не срабатывали повторно
            window.removeEventListener('click', unmuteVideo);
            window.removeEventListener('mousemove', unmuteVideo);
            window.removeEventListener('keydown', unmuteVideo);
        }

        // Ждем любого действия от пользователя в окне оверлея
        window.addEventListener('click', unmuteVideo);
        window.addEventListener('mousemove', unmuteVideo);
        window.addEventListener('keydown', unmuteVideo);
    </script>

</body>
</html>
